name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Run linter
        working-directory: backend
        run: npm run lint

  backend-test:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      
      - name: Install dependencies
        working-directory: backend
        run: npm install
      
      - name: Run tests
        working-directory: backend
        run: npm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: backend-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      
      - name: Install dependencies
        working-directory: e2e
        run: npm install
      
      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps
      
      - name: Start backend
        working-directory: backend
        run: npm run dev &
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ipl_fantasy_test
          DB_USER: postgres
          DB_PASSWORD: postgres
      
      - name: Wait for backend
        run: sleep 10
      
      - name: Run e2e tests
        working-directory: e2e
        run: npm test

  ios-build:
    runs-on: macos-latest
    needs: backend-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_15.app
      
      - name: Install XcodeGen
        run: brew install xcodegen
      
      - name: Generate project
        working-directory: iOS
        run: xcodegen generate
      
      - name: Build iOS
        run: |
          cd iOS
          xcodebuild -project IPLFantasyPro.xcodeproj \
            -scheme IPLFantasyPro \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
